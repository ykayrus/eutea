<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jogo das Formas - Extensão Estácio</title>
  <style>
    /* ===== VARIÁVEIS ===== */
    :root {
      --bg-panel: rgba(255, 255, 255, 0.90);
      --ink: #2A2A2A;
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
      --slot-empty: rgba(210, 200, 185, 0.55);
      --success: #5D8F6E;
      --glow-color: rgba(93, 143, 110, 0.30);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      touch-action: manipulation;
      background: #f5f0ea;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 40px;
      backdrop-filter: blur(2px);
    }

    #header {
      text-align: center;
      margin-bottom: 24px;
      background: var(--bg-panel);
      padding: 16px 28px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      width: 100%;
      max-width: 700px;
    }
    #header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #3A5A4E;
    }
    #header h1 small {
      font-size: 16px;
      font-weight: 400;
      display: block;
      color: #6A7F76;
      margin-top: 4px;
    }
    #header .sub {
      font-size: 14px;
      color: #7A8F86;
      margin-top: 4px;
      opacity: 0.8;
    }

    #topbar {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 50;
    }
    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--bg-panel);
      box-shadow: var(--shadow);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: transform 0.15s;
    }
    .icon-btn:active { transform: scale(0.92); }

    #board-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 800px;
      background: var(--bg-panel);
      padding: 32px 24px 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      flex-wrap: wrap;
      gap: 8px 16px;
    }
    #message {
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
      opacity: 0.85;
      flex: 1;
      min-width: 140px;
    }
    #score {
      font-size: 18px;
      font-weight: 600;
      background: rgba(93, 143, 110, 0.15);
      padding: 6px 18px;
      border-radius: 40px;
      color: #3A5A4E;
      white-space: nowrap;
    }

    #slots {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      width: 100%;
    }
    .slot {
      width: 120px;
      height: 120px;
      background: var(--slot-empty);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.3s, transform 0.2s;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
    }
    .slot.glow {
      background: var(--glow-color);
      transform: scale(1.02);
    }
    .slot.filled {
      background: transparent;
      box-shadow: none;
    }
    .slot-outline {
      width: 76px;
      height: 76px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .slot.filled .slot-outline { opacity: 0; }

    #pieces-tray {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      min-height: 130px;
      padding: 8px 0;
    }
    .piece {
      width: 100px;
      height: 100px;
      cursor: grab;
      touch-action: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.10));
      transition: transform 0.2s, opacity 0.25s;
      will-change: transform;
    }
    .piece.dragging {
      cursor: grabbing;
      z-index: 100;
      transform: scale(1.10);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.20));
    }
    .piece.placed {
      opacity: 0;
      pointer-events: none;
    }
    .piece.wrong-shake {
      animation: shake 0.4s ease;
    }
    .piece.correct-pop {
      animation: pop 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0.5; }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); opacity: 1; }
    }

    #celebration {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(245, 241, 232, 0.92);
      backdrop-filter: blur(6px);
      z-index: 200;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
    }
    #celebration.show { display: flex; }
    #celebration-emoji {
      font-size: 110px;
      animation: pop 0.6s ease;
    }
    #celebration-text {
      font-size: 34px;
      font-weight: 700;
      color: var(--success);
      text-align: center;
    }
    #restart-btn {
      margin-top: 10px;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 40px;
      border: none;
      background: var(--success);
      color: white;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(93, 143, 110, 0.4);
      transition: transform 0.2s;
    }
    #restart-btn:active { transform: scale(0.94); }

    .confetti-piece {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      opacity: 0.9;
    }

    #footer {
      margin-top: 20px;
      font-size: 13px;
      color: #7A8F86;
      text-align: center;
      background: var(--bg-panel);
      padding: 10px 20px;
      border-radius: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      opacity: 0.9;
      width: auto;
      max-width: 90%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px 16px;
    }
    #footer .version {
      font-weight: 600;
      color: var(--success);
      background: rgba(93, 143, 110, 0.12);
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    #footer .counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.04);
      padding: 2px 14px;
      border-radius: 30px;
      font-weight: 500;
    }
    #footer .counter span {
      font-weight: 700;
      color: #3A5A4E;
    }

    @media (max-width: 600px) {
      .slot, .piece { width: 80px; height: 80px; }
      .slot-outline { width: 52px; height: 52px; }
      #slots, #pieces-tray { gap: 16px; }
      #header h1 { font-size: 22px; }
      #board-area { padding: 20px 16px 28px; }
      #message { font-size: 17px; }
      #score { font-size: 15px; padding: 4px 14px; }
      #celebration-emoji { font-size: 80px; }
      #celebration-text { font-size: 26px; }
      #footer { flex-direction: column; gap: 4px; }
    }
    @media (max-width: 400px) {
      .slot, .piece { width: 68px; height: 68px; }
      .slot-outline { width: 44px; height: 44px; }
      #slots, #pieces-tray { gap: 10px; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <div id="topbar">
      <button class="icon-btn" id="sound-btn" title="Som">🔇</button>
      <button class="icon-btn" id="reset-btn" title="Reiniciar">↻</button>
    </div>

    <div id="header">
      <h1>
        🧩 Jogo das Formas
        <small>Atividade de Extensão – Juliano Schell</small>
      </h1>
      <div class="sub">Arraste cada forma para o seu lugar</div>
    </div>

    <div id="board-area">
      <div id="status-bar">
        <div id="message">Vamos começar!</div>
        <div id="score">✅ 0 / 0</div>
      </div>
      <div id="slots"></div>
      <div id="pieces-tray"></div>
    </div>

    <div id="footer">
      <span>🏛️ Trabalho de Extensão – Estácio de Sá • 2026</span>
      <span class="version">EuTea ver 0.1</span>
      <span class="counter">👁️ <span id="visit-count">0</span> visitas</span>
    </div>
  </div>

  <div id="celebration">
    <div id="celebration-emoji">🎉</div>
    <div id="celebration-text">Parabéns, você completou todas as fases!</div>
    <button id="restart-btn">Jogar de novo</button>
  </div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <!-- Formas geométricas -->
      <symbol id="shape-circle" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" /></symbol>
      <symbol id="shape-square" viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" rx="6" /></symbol>
      <symbol id="shape-triangle" viewBox="0 0 100 100"><polygon points="50,8 92,88 8,88" /></symbol>
      <symbol id="shape-star" viewBox="0 0 100 100"><polygon points="50,5 61,38 96,38 67,59 78,92 50,71 22,92 33,59 4,38 39,38" /></symbol>
      <symbol id="shape-hex" viewBox="0 0 100 100"><polygon points="50,4 91,27 91,73 50,96 9,73 9,27" /></symbol>

      <!-- Letras -->
      <symbol id="shape-a" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">A</text></symbol>
      <symbol id="shape-b" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">B</text></symbol>
      <symbol id="shape-c" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">C</text></symbol>
      <symbol id="shape-d" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">D</text></symbol>

      <!-- Números -->
      <symbol id="shape-1" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">1</text></symbol>
      <symbol id="shape-2" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">2</text></symbol>
      <symbol id="shape-3" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">3</text></symbol>
      <symbol id="shape-4" viewBox="0 0 100 100"><text x="50" y="68" font-size="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">4</text></symbol>
    </defs>
  </svg>

  <script>
    (function(){
      'use strict';

      // ================================================================
      // 1. BACKGROUND – CORES FORTES E VIVAS
      // ================================================================
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      let particles = [];
      const NUM_PARTICLES = 45;

      function resizeCanvas() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function initParticles() {
        particles = [];
        const hueOptions = [210, 150, 270, 10, 120];
        for (let i = 0; i < NUM_PARTICLES; i++) {
          const hue = hueOptions[Math.floor(Math.random() * hueOptions.length)] + (Math.random() - 0.5) * 20;
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: 3 + Math.random() * 6,
            dx: (Math.random() - 0.5) * 0.3,
            dy: (Math.random() - 0.5) * 0.3,
            color: `hsla(${hue}, 85%, 60%, ${0.5 + Math.random() * 0.4})`
          });
        }
      }
      initParticles();

      function drawWaves(time) {
        const grad = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
        grad.addColorStop(0, '#f5efe8');
        grad.addColorStop(0.5, '#ebe3d9');
        grad.addColorStop(1, '#ddd5c9');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        const waveLayers = [
          { baseY: 0.15, amp: 55, freq: 0.005, speed: 0.0006, hue: 210, sat: 90, light: 45, alpha: 0.45 },
          { baseY: 0.35, amp: 60, freq: 0.007, speed: 0.0008, hue: 150, sat: 85, light: 40, alpha: 0.40 },
          { baseY: 0.55, amp: 50, freq: 0.004, speed: 0.0010, hue: 270, sat: 85, light: 50, alpha: 0.38 },
          { baseY: 0.75, amp: 60, freq: 0.006, speed: 0.0005, hue: 10, sat: 90, light: 48, alpha: 0.42 },
          { baseY: 0.92, amp: 42, freq: 0.008, speed: 0.0009, hue: 140, sat: 80, light: 42, alpha: 0.40 }
        ];

        for (const layer of waveLayers) {
          ctx.beginPath();
          const yBase = H * layer.baseY;
          const amp = layer.amp;
          const freq = layer.freq;
          const speed = layer.speed;
          ctx.moveTo(0, H);

          for (let x = 0; x <= W; x += 2) {
            const y = yBase
              + Math.sin(x * freq + time * speed) * amp
              + Math.sin(x * freq * 2.1 + time * speed * 1.6) * (amp * 0.35)
              + Math.sin(x * freq * 0.7 + time * speed * 0.5) * (amp * 0.2);
            ctx.lineTo(x, y);
          }
          ctx.lineTo(W, H);
          ctx.closePath();

          ctx.fillStyle = `hsla(${layer.hue}, ${layer.sat}%, ${layer.light}%, ${layer.alpha})`;
          ctx.fill();
        }

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          const yBase = H * (0.18 + i * 0.22);
          const amp = 35 + i * 12;
          const freq = 0.007 + i * 0.002;
          const speed = 0.0008 + i * 0.0003;
          ctx.moveTo(0, yBase);
          for (let x = 0; x <= W; x += 3) {
            const y = yBase + Math.sin(x * freq + time * speed) * amp;
            ctx.lineTo(x, y);
          }
          ctx.strokeStyle = `hsla(${190 + i*50}, 80%, 65%, 0.25)`;
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
        ctx.restore();

        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.shadowColor = 'rgba(255,255,255,0.5)';
          ctx.shadowBlur = 18;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function updateParticles() {
        for (const p of particles) {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < -20) p.x = W + 20;
          if (p.x > W + 20) p.x = -20;
          if (p.y < -20) p.y = H + 20;
          if (p.y > H + 20) p.y = -20;
        }
      }

      let startTime = performance.now();
      function animateBackground(now) {
        const elapsed = (now - startTime) / 1000;
        drawWaves(elapsed);
        updateParticles();
        requestAnimationFrame(animateBackground);
      }

      window.addEventListener('resize', () => {
        resizeCanvas();
        for (const p of particles) {
          p.x = Math.min(Math.max(p.x, 0), W);
          p.y = Math.min(Math.max(p.y, 0), H);
        }
      });

      animateBackground(performance.now());

      // ================================================================
      // 2. JOGO COM FASES E CORES SORTIDAS (CORRIGIDO)
      // ================================================================

      // Definição das fases com cores variadas e vibrantes
      const PHASES = [
        {
          name: 'Formas',
          items: [
            { id: 'circle', color: '#5D9BA8' },
            { id: 'square', color: '#C9975E' },
            { id: 'triangle', color: '#8AB87A' },
            { id: 'star', color: '#D4A86A' }
          ]
        },
        {
          name: 'Letras',
          items: [
            { id: 'a', color: '#E74C3C' },
            { id: 'b', color: '#3498DB' },
            { id: 'c', color: '#2ECC71' },
            { id: 'd', color: '#F1C40F' }
          ]
        },
        {
          name: 'Números',
          items: [
            { id: '1', color: '#9B59B6' },
            { id: '2', color: '#E67E22' },
            { id: '3', color: '#1ABC9C' },
            { id: '4', color: '#E74C3C' }
          ]
        }
      ];

      let currentPhase = 0;
      let placedCount = 0;
      let activeShapes = [];
      let soundOn = false;
      let scoreElement = document.getElementById('score');
      let messageElement = document.getElementById('message');
      let slotsEl = document.getElementById('slots');
      let trayEl = document.getElementById('pieces-tray');
      let celebrationEl = document.getElementById('celebration');
      let soundBtn = document.getElementById('sound-btn');
      let resetBtn = document.getElementById('reset-btn');
      let restartBtn = document.getElementById('restart-btn');

      const MESSAGES = [
        'Muito bem! 🌟', 'Ótimo! 👏', 'Continue assim! 💪',
        'Perfeito! ✨', 'Você está arrasando! 🚀', 'Isso aí! 🎯',
        'Que legal! 😊', 'Mandou bem! 🎈'
      ];

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function playTone(freq, duration) {
        if (!soundOn) return;
        try {
          const ctx = window._audioCtx || (window._audioCtx = new (window.AudioContext || window.webkitAudioContext)());
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.value = 0.08;
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
          osc.stop(ctx.currentTime + duration);
        } catch (e) {}
      }

      // ===== FUNÇÃO CORRIGIDA: agora aplica fill E color =====
      function makeShapeSVG(shapeId, color, extraAttrs) {
        const ns = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        if (extraAttrs) {
          for (const k in extraAttrs) svg.setAttribute(k, extraAttrs[k]);
        }
        const use = document.createElementNS(ns, 'use');
        use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#shape-' + shapeId);
        use.setAttribute('href', '#shape-' + shapeId);
        use.style.fill = color;
        use.style.color = color;   // <-- CORREÇÃO: para textos com currentColor
        svg.appendChild(use);
        return svg;
      }

      function updateScore() {
        const total = activeShapes.length;
        scoreElement.textContent = `Fase ${currentPhase+1}: ${placedCount} / ${total}`;
      }

      function showRandomMessage() {
        const idx = Math.floor(Math.random() * MESSAGES.length);
        messageElement.textContent = MESSAGES[idx];
        messageElement.style.opacity = '1';
      }

      function buildRound(items) {
        placedCount = 0;
        slotsEl.innerHTML = '';
        trayEl.innerHTML = '';
        messageElement.textContent = `Fase ${currentPhase+1}: ${PHASES[currentPhase].name}`;
        messageElement.style.opacity = '0.85';
        activeShapes = shuffle(items);
        const slotOrder = shuffle(activeShapes);
        const pieceOrder = shuffle(activeShapes);

        activeShapes.forEach(shape => {
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.dataset.shape = shape.id;
          const outline = makeShapeSVG(shape.id, '#888', { class: 'slot-outline' });
          slot.appendChild(outline);
          slotsEl.appendChild(slot);
        });

        const slotEls = Array.from(slotsEl.children);
        const reordered = [];
        slotOrder.forEach(s => {
          const match = slotEls.find(el => el.dataset.shape === s.id && !reordered.includes(el));
          if (match) reordered.push(match);
        });
        reordered.forEach(el => slotsEl.appendChild(el));

        pieceOrder.forEach(shape => {
          const piece = document.createElement('div');
          piece.className = 'piece';
          piece.dataset.shape = shape.id;
          piece.style.touchAction = 'none';
          const svg = makeShapeSVG(shape.id, shape.color, { style: 'width:100%;height:100%;pointer-events:none' });
          piece.appendChild(svg);
          trayEl.appendChild(piece);
          attachDrag(piece);
        });

        updateScore();
      }

      function attachDrag(piece) {
        let origParent, origNextSibling, offsetX, offsetY;
        let dragging = false;

        function getPoint(e) {
          if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
          return { x: e.clientX, y: e.clientY };
        }

        function onDown(e) {
          if (piece.classList.contains('placed')) return;
          e.preventDefault();
          dragging = true;
          piece.classList.add('dragging');
          const rect = piece.getBoundingClientRect();
          const pt = getPoint(e);
          offsetX = pt.x - rect.left;
          offsetY = pt.y - rect.top;
          origParent = piece.parentElement;
          origNextSibling = piece.nextSibling;
          document.body.appendChild(piece);
          piece.style.position = 'fixed';
          piece.style.width = rect.width + 'px';
          piece.style.height = rect.height + 'px';
          movePiece(pt);
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onUp);
        }

        function movePiece(pt) {
          piece.style.left = (pt.x - offsetX) + 'px';
          piece.style.top = (pt.y - offsetY) + 'px';
        }

        function onMove(e) {
          if (!dragging) return;
          e.preventDefault();
          movePiece(getPoint(e));
        }

        function onUp(e) {
          if (!dragging) return;
          dragging = false;
          piece.classList.remove('dragging');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onUp);

          const pt = getPoint(e.changedTouches ? { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY } : e);
          const target = findSlotUnder(pt);

          piece.style.position = '';
          piece.style.left = '';
          piece.style.top = '';
          piece.style.width = '';
          piece.style.height = '';

          if (target && target.dataset.shape === piece.dataset.shape && !target.classList.contains('filled')) {
            snapInto(piece, target);
            playTone(660, 0.15);
            placedCount++;
            updateScore();
            showRandomMessage();

            if (placedCount >= activeShapes.length) {
              if (currentPhase < PHASES.length - 1) {
                currentPhase++;
                setTimeout(() => {
                  buildRound(PHASES[currentPhase].items);
                }, 600);
              } else {
                setTimeout(showCelebration, 500);
              }
            }
          } else {
            if (target) {
              target.classList.add('glow');
              setTimeout(() => target.classList.remove('glow'), 350);
            }
            piece.classList.add('wrong-shake');
            setTimeout(() => piece.classList.remove('wrong-shake'), 400);
            origParent.insertBefore(piece, origNextSibling);
            playTone(220, 0.18);
            messageElement.textContent = 'Tente novamente! 😅';
            messageElement.style.opacity = '0.9';
          }
        }

        function findSlotUnder(pt) {
          const slots = Array.from(slotsEl.children);
          for (const slot of slots) {
            const r = slot.getBoundingClientRect();
            if (pt.x >= r.left && pt.x <= r.right && pt.y >= r.top && pt.y <= r.bottom) {
              return slot;
            }
          }
          return null;
        }

        piece.addEventListener('mousedown', onDown);
        piece.addEventListener('touchstart', onDown, { passive: false });
      }

      function snapInto(piece, slot) {
        slot.classList.add('filled');
        slot.innerHTML = '';
        piece.style.position = '';
        piece.style.left = '';
        piece.style.top = '';
        piece.style.width = '100px';
        piece.style.height = '100px';
        piece.classList.add('placed');
        slot.appendChild(piece);
        piece.classList.remove('placed');
        piece.style.pointerEvents = 'none';
        piece.classList.add('correct-pop');
        setTimeout(() => piece.classList.remove('correct-pop'), 400);
      }

      function showCelebration() {
        celebrationEl.classList.add('show');
        playTone(880, 0.2);
        setTimeout(() => playTone(1100, 0.25), 180);
        launchConfetti();
      }

      function launchConfetti() {
        const colors = ['#5D9BA8', '#C9975E', '#8AB87A', '#D4A86A', '#A98ABF', '#F0A8A8', '#F7D67A'];
        const container = celebrationEl;
        for (let i = 0; i < 35; i++) {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.background = colors[i % colors.length];
          c.style.left = (15 + Math.random() * 70) + 'vw';
          c.style.top = '25vh';
          c.style.width = (8 + Math.random() * 12) + 'px';
          c.style.height = (8 + Math.random() * 12) + 'px';
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          container.appendChild(c);
          const angle = (Math.random() * Math.PI * 2);
          const dist = 130 + Math.random() * 220;
          const dx = Math.cos(angle) * dist;
          const dy = Math.sin(angle) * dist - 100;
          c.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: `translate(${dx}px, ${dy + 400}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
          ], { duration: 1500 + Math.random() * 600, easing: 'ease-out' });
          setTimeout(() => c.remove(), 2300);
        }
      }

      function resetGame() {
        celebrationEl.classList.remove('show');
        celebrationEl.querySelectorAll('.confetti-piece').forEach(c => c.remove());
        currentPhase = 0;
        buildRound(PHASES[currentPhase].items);
        messageElement.textContent = 'Vamos começar!';
      }

      // ================================================================
      // 3. CONTADOR DE ACESSOS (usando CountAPI - mileshilliard.com)
      // ================================================================
      const counterEl = document.getElementById('visit-count');

      async function updateCounter() {
        try {
          // Usando o novo CountAPI (sucessor do countapi.xyz)
          const response = await fetch('https://countapi.mileshilliard.com/api/v1/hit/eutea-jogo-visitas');
          const data = await response.json();
          if (data && typeof data.value === 'number') {
            counterEl.textContent = data.value;
            // Salva no localStorage como fallback
            localStorage.setItem('visita_contador', data.value);
          }
        } catch (e) {
          // Fallback: mostra o último valor salvo
          const localCount = localStorage.getItem('visita_contador');
          if (localCount) {
            counterEl.textContent = localCount;
          } else {
            counterEl.textContent = '0';
          }
          console.warn('Contador indisponível - usando cache local');
        }
      }

      // Atualiza o contador ao carregar a página e a cada 30 segundos
      updateCounter();
      setInterval(updateCounter, 30000);

      // ================================================================
      // 4. EVENTOS E INICIALIZAÇÃO
      // ================================================================
      soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        soundBtn.textContent = soundOn ? '🔊' : '🔇';
      });

      resetBtn.addEventListener('click', resetGame);
      restartBtn.addEventListener('click', resetGame);

      resetGame();

    })();
  </script>
</body>
</html>
